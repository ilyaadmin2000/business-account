<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бизнес счёт - Виртуальный банк</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .login-section, .account-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .balance-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .balance-amount {
            font-size: 3.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .button.developer {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
            border: 2px solid #ffd700;
        }

        .transaction-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .message {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .user-id {
            font-size: 1.2em;
            color: #1e3c72;
            font-weight: 600;
        }

        .developer-badge {
            background: #ffd700;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .logout-btn {
            background: #dc3545;
            padding: 8px 20px;
            width: auto;
        }

        .hidden {
            display: none;
        }

        .developer-section {
            border-top: 3px solid #ffd700;
            margin-top: 20px;
            padding-top: 20px;
        }

        .dev-title {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Бизнес счёт</h1>
            <p>Введите ID для входа в систему</p>
        </div>

        <!-- Форма входа -->
        <div id="loginSection" class="login-section">
            <div class="input-group">
                <label>Ваш ID:</label>
                <input type="text" id="userId" placeholder="Введите ваш бизнес-ID" value="user123">
            </div>
            <button class="button" onclick="login()">Войти в систему</button>
        </div>

        <!-- Кабинет пользователя -->
        <div id="accountSection" class="account-section hidden">
            <div class="user-info">
                <span class="user-id" id="displayUserId"></span>
                <button class="button logout-btn" onclick="logout()">Выйти</button>
            </div>

            <!-- Баланс -->
            <div class="balance-section">
                <div class="balance-label">Ваш бизнес-баланс</div>
                <div class="balance-amount" id="balance">0</div>
                <div>виртуальных монет</div>
            </div>

            <!-- Для всех пользователей -->
            <div id="userSection">
                <div class="input-group">
                    <label>Сумма перевода:</label>
                    <input type="number" id="amount" placeholder="Введите сумму" min="0" value="100">
                </div>

                <div class="input-group">
                    <label>ID получателя:</label>
                    <input type="text" id="recipientId" placeholder="Введите ID получателя">
                </div>
                <button class="button" onclick="transfer()">↗️ Перевести монеты</button>
            </div>

            <!-- Секция для adminbuisness -->
            <div id="developerSection" class="developer-section hidden">
                <div class="dev-title">⭐ АДМИНИСТРАТОР ⭐</div>
                
                <div class="input-group">
                    <label>Сумма операции:</label>
                    <input type="number" id="devAmount" placeholder="Введите сумму" min="0" value="1000">
                </div>

                <div class="transaction-row">
                    <button class="button developer" onclick="devDeposit()">💰 Пополнить</button>
                    <button class="button developer" onclick="devWithdraw()">💸 Снять</button>
                </div>

                <div class="input-group">
                    <label>ID пользователя:</label>
                    <input type="text" id="targetUserId" placeholder="Введите ID пользователя">
                </div>
                <button class="button developer" onclick="manageUserBalance()">⚙️ Управление балансом</button>
            </div>

            <!-- Сообщения -->
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        // ID администратора
        const DEVELOPER_ID = 'adminbuisness';
        
        // База данных
        let users = {};
        let currentUser = null;

        function loadData() {
            const savedData = localStorage.getItem('businessBankUsers');
            if (savedData) {
                users = JSON.parse(savedData);
            } else {
                users = {
                    'user123': { balance: 1000 },
                    'adminbuisness': { balance: 50000 }
                };
            }
        }

        function saveData() {
            localStorage.setItem('businessBankUsers', JSON.stringify(users));
        }

        function isDeveloper(userId) {
            return userId === DEVELOPER_ID;
        }

        function login() {
            const userId = document.getElementById('userId').value.trim();
            
            if (!userId) {
                showMessage('Введите ID', 'error');
                return;
            }

            if (!users[userId]) {
                users[userId] = { balance: 1000 };
                saveData();
            }

            currentUser = userId;
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('accountSection').classList.remove('hidden');
            
            const displayName = document.getElementById('displayUserId');
            if (isDeveloper(userId)) {
                displayName.innerHTML = `ID: ${userId} <span class="developer-badge">АДМИНИСТРАТОР</span>`;
                document.getElementById('developerSection').classList.remove('hidden');
            } else {
                displayName.textContent = `ID: ${userId}`;
                document.getElementById('developerSection').classList.add('hidden');
            }
            
            updateBalance();
            showMessage(`Добро пожаловать, ${userId}!`, 'success');
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('accountSection').classList.add('hidden');
            document.getElementById('message').innerHTML = '';
        }

        function updateBalance() {
            if (currentUser && users[currentUser]) {
                document.getElementById('balance').textContent = users[currentUser].balance;
            }
        }

        function transfer() {
            const amount = parseFloat(document.getElementById('amount').value);
            const recipientId = document.getElementById('recipientId').value.trim();
            
            if (!validateAmount(amount)) return;
            
            if (!recipientId) {
                showMessage('Введите ID получателя', 'error');
                return;
            }
            
            if (recipientId === currentUser) {
                showMessage('Нельзя перевести самому себе', 'error');
                return;
            }
            
            if (users[currentUser].balance < amount) {
                showMessage('Недостаточно средств', 'error');
                return;
            }
            
            if (!users[recipientId]) {
                users[recipientId] = { balance: 0 };
            }
            
            users[currentUser].balance -= amount;
            users[recipientId].balance += amount;
            
            saveData();
            updateBalance();
            showMessage(`✅ Переведено ${amount} монет пользователю ${recipientId}`, 'success');
            document.getElementById('recipientId').value = '';
        }

        function devDeposit() {
            if (!isDeveloper(currentUser)) {
                showMessage('❌ Доступно только администратору!', 'error');
                return;
            }
            
            const amount = parseFloat(document.getElementById('devAmount').value);
            
            if (!validateAmount(amount)) return;
            
            users[currentUser].balance += amount;
            saveData();
            updateBalance();
            showMessage(`💰 Счёт пополнен на ${amount} монет`, 'success');
        }

        function devWithdraw() {
            if (!isDeveloper(currentUser)) {
                showMessage('❌ Доступно только администратору!', 'error');
                return;
            }
            
            const amount = parseFloat(document.getElementById('devAmount').value);
            
            if (!validateAmount(amount)) return;
            
            if (users[currentUser].balance < amount) {
                showMessage('❌ Недостаточно средств', 'error');
                return;
            }
            
            users[currentUser].balance -= amount;
            saveData();
            updateBalance();
            showMessage(`💸 Снято ${amount} монет`, 'success');
        }

        function manageUserBalance() {
            if (!isDeveloper(currentUser)) {
                showMessage('❌ Доступно только администратору!', 'error');
                return;
            }
            
            const targetUserId = document.getElementById('targetUserId').value.trim();
            const amount = parseFloat(document.getElementById('devAmount').value);
            
            if (!targetUserId) {
                showMessage('❌ Введите ID пользователя', 'error');
                return;
            }
            
            if (!validateAmount(amount)) return;
            
            if (!users[targetUserId]) {
                users[targetUserId] = { balance: 0 };
            }
            
            users[targetUserId].balance += amount;
            
            saveData();
            showMessage(`✅ Пользователю ${targetUserId} добавлено ${amount} монет`, 'success');
            document.getElementById('targetUserId').value = '';
        }

        function validateAmount(amount) {
            if (isNaN(amount) || amount <= 0) {
                showMessage('❌ Введите корректную сумму', 'error');
                return false;
            }
            return true;
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type === 'success' ? 'success-message' : 'error-message'}`;
            
            setTimeout(() => {
                messageDiv.innerHTML = '';
                messageDiv.className = 'message';
            }, 3000);
        }

        loadData();
    </script>
</body>
</html>
